<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачи</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header>
      <button id="sidebar-toggle" class="icon-btn" title="Проекты">☰</button>
      <span class="logo" id="current-project-name">Все задачи</span>
      <div class="header-right">
        <button id="voice-btn" class="icon-btn" title="Голосовая команда">⏺</button>
        <button id="key-btn" class="icon-btn" title="API ключ">⚿</button>
        <button id="theme-btn" class="icon-btn" title="Тема">◐</button>
      </div>
    </header>

    <div id="key-bar" class="key-bar hidden">
      <input id="key-input" type="password" placeholder="sk-ant-... (для улучшения заголовков)">
      <button id="key-save">Сохранить</button>
    </div>

    <div class="workspace">

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <span class="sidebar-title">Проекты</span>
          <button class="sidebar-add" id="add-project-btn" title="Новый проект">+</button>
        </div>
        <div id="project-list"></div>
      </aside>

      <main class="board" id="board"></main>

    </div>
  </div>

  <!-- Voice overlay -->
  <div id="voice-overlay" class="voice-overlay hidden">
    <div class="voice-box">
      <div class="voice-waves" id="voice-waves">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div id="voice-transcript" class="voice-transcript">Говорите…</div>
      <input id="voice-text" class="voice-text" placeholder="Или введите команду…">
      <div class="voice-actions">
        <button id="voice-send" class="btn-voice-send">Выполнить</button>
        <button id="voice-cancel" class="btn-voice-cancel">Отмена</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
